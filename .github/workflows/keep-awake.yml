name: Supabase Health Heartbeat
on:
  schedule:
    - cron: '0 0 */3 * *' # Every 3 days at midnight
  workflow_dispatch: # Allows manual trigger

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          # 1. Ping the Database (REST API)
          DB_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${SUPABASE_URL}/rest/v1/profiles?select=id&limit=1" \
          -H "apikey: ${SUPABASE_ANON_KEY}" \
          -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          
          # 2. Ping the Auth service health endpoint
          AUTH_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${SUPABASE_URL}/auth/v1/health" \
          -H "apikey: ${SUPABASE_ANON_KEY}")

          echo "Database Response: $DB_RESPONSE"
          echo "Auth Response: $AUTH_RESPONSE"
          
          if [ "$DB_RESPONSE" -eq 200 ] && [ "$AUTH_RESPONSE" -eq 200 ]; then
            echo "Successfully pinged both Database and Auth services. Project remains active! ✅"
          else
            echo "Heartbeat failed. (DB: $DB_RESPONSE, Auth: $AUTH_RESPONSE). Please check your Supabase secrets. ❌"
            exit 1
          fi
